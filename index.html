<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모델 DM 관리 - 2026.03</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; padding: 16px; }

  h1 { text-align: center; font-size: 1.5rem; margin-bottom: 4px; color: #fff; }
  .subtitle { text-align: center; color: #888; font-size: 0.85rem; margin-bottom: 20px; }

  /* 통계 */
  .stats { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; justify-content: center; }
  .stat { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 10px 16px; text-align: center; min-width: 80px; }
  .stat-num { font-size: 1.4rem; font-weight: 800; color: #8b5cf6; }
  .stat-label { font-size: 0.7rem; color: #888; margin-top: 2px; }

  /* 소스 필터 */
  .source-filter { display: flex; gap: 8px; justify-content: center; margin-bottom: 12px; flex-wrap: wrap; }
  .source-btn { padding: 6px 16px; border-radius: 20px; border: 1px solid #333; background: #1a1a1a; color: #aaa; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: all 0.2s; }
  .source-btn.active { background: #6366f1; color: #fff; border-color: #6366f1; }
  .source-btn:hover { border-color: #6366f1; }

  /* 상태 탭 */
  .status-tabs { display: flex; gap: 6px; justify-content: center; margin-bottom: 16px; flex-wrap: wrap; }
  .status-tab { padding: 8px 18px; border-radius: 8px; border: 2px solid transparent; background: #1a1a1a; color: #aaa; cursor: pointer; font-size: 0.85rem; font-weight: 700; transition: all 0.2s; position: relative; }
  .status-tab .count { font-size: 0.65rem; background: #333; color: #999; padding: 1px 6px; border-radius: 10px; margin-left: 4px; }
  .status-tab:hover { background: #222; }
  .status-tab[data-status="all"].active { border-color: #8b5cf6; color: #fff; background: #1a1a2e; }
  .status-tab[data-status="all"].active .count { background: #8b5cf6; color: #fff; }
  .status-tab[data-status="candidate1"].active { border-color: #6366f1; color: #a78bfa; background: #1a1a3e; }
  .status-tab[data-status="candidate1"].active .count { background: #6366f1; color: #fff; }
  .status-tab[data-status="candidate2"].active { border-color: #3b82f6; color: #60a5fa; background: #0f1b2d; }
  .status-tab[data-status="candidate2"].active .count { background: #3b82f6; color: #fff; }
  .status-tab[data-status="candidate3"].active { border-color: #64748b; color: #94a3b8; background: #0f172a; }
  .status-tab[data-status="candidate3"].active .count { background: #64748b; color: #fff; }
  .status-tab[data-status="contacting"].active { border-color: #f59e0b; color: #fbbf24; background: #1c1508; }
  .status-tab[data-status="contacting"].active .count { background: #f59e0b; color: #000; }
  .status-tab[data-status="selected"].active { border-color: #10b981; color: #34d399; background: #071f17; }
  .status-tab[data-status="selected"].active .count { background: #10b981; color: #fff; }
  .status-tab[data-status="rejected"].active { border-color: #ef4444; color: #f87171; background: #1f0a0a; }
  .status-tab[data-status="rejected"].active .count { background: #ef4444; color: #fff; }

  /* 검색 */
  .search-box { display: flex; justify-content: center; margin-bottom: 16px; }
  .search-box input { width: 100%; max-width: 400px; padding: 8px 14px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 0.85rem; outline: none; }
  .search-box input:focus { border-color: #6366f1; }

  /* 카드 */
  .cards { display: grid; gap: 10px; }
  .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 14px; display: flex; gap: 12px; transition: all 0.2s; }
  .card:hover { border-color: #444; }
  .card.status-candidate1 { border-left: 3px solid #6366f1; }
  .card.status-candidate2 { border-left: 3px solid #3b82f6; }
  .card.status-candidate3 { border-left: 3px solid #64748b; }
  .card.status-contacting { border-left: 3px solid #f59e0b; }
  .card.status-selected { border-left: 3px solid #10b981; }
  .card.status-rejected { border-left: 3px solid #ef4444; opacity: 0.5; }
  .card.hidden { display: none; }

  .card-left { flex-shrink: 0; text-align: center; width: 80px; }
  .avatar { width: 56px; height: 56px; border-radius: 50%; background: #333; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; margin: 0 auto 4px; overflow: hidden; }
  .platform-badge { font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; font-weight: 700; display: inline-block; margin-top: 2px; }
  .badge-ig { background: linear-gradient(45deg, #f09433, #dc2743); color: #fff; }
  .badge-threads { background: #333; color: #fff; }
  .follower-count { font-size: 0.6rem; color: #666; margin-top: 2px; }

  .card-right { flex: 1; min-width: 0; }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 4px; }
  .card-name { font-size: 0.95rem; font-weight: 700; color: #fff; }
  .card-handle { font-size: 0.75rem; color: #888; margin-bottom: 6px; }
  .card-handle a { color: #8b5cf6; text-decoration: none; }
  .card-handle a:hover { text-decoration: underline; }

  .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
  .tag { font-size: 0.65rem; padding: 2px 7px; border-radius: 12px; font-weight: 600; }
  .tag-concept { background: #1e3a5f; color: #60a5fa; }
  .tag-location { background: #1a3329; color: #4ade80; }
  .tag-date { background: #3b1f2b; color: #f472b6; }
  .tag-paid { background: #3d2b00; color: #fbbf24; }
  .tag-type { background: #1f2937; color: #9ca3af; }
  .tag-gender-m { background: #1e3a5f; color: #93c5fd; }

  .card-msg { font-size: 0.8rem; color: #999; line-height: 1.4; margin-bottom: 8px; }

  .specs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 6px; }
  .spec-item { font-size: 0.65rem; color: #777; background: #111; padding: 2px 6px; border-radius: 4px; }
  .spec-item strong { color: #bbb; }

  /* 컨트롤 영역 */
  .card-controls { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-top: 6px; padding-top: 8px; border-top: 1px solid #222; }
  .status-select { padding: 4px 8px; border-radius: 6px; border: 1px solid #333; background: #111; color: #ccc; font-size: 0.75rem; cursor: pointer; outline: none; }
  .status-select:focus { border-color: #6366f1; }
  .date-input { padding: 4px 8px; border-radius: 6px; border: 1px solid #333; background: #111; color: #ccc; font-size: 0.75rem; cursor: pointer; outline: none; width: 140px; }
  .date-input:focus { border-color: #6366f1; }
  .time-input { padding: 4px 8px; border-radius: 6px; border: 1px solid #333; background: #111; color: #ccc; font-size: 0.75rem; cursor: pointer; outline: none; width: 95px; }
  .time-input:focus { border-color: #6366f1; }
  .note-input { padding: 4px 8px; border-radius: 6px; border: 1px solid #333; background: #111; color: #ccc; font-size: 0.75rem; outline: none; flex: 1; min-width: 120px; }
  .note-input:focus { border-color: #6366f1; }

  .card-time { font-size: 0.7rem; color: #555; }

  .note-display { background: #111; border-left: 2px solid #6366f1; padding: 4px 8px; margin-top: 4px; border-radius: 0 4px 4px 0; font-size: 0.75rem; color: #aaa; }

  /* 스케줄 요약 */
  .schedule-summary { background: #1a1a2e; border: 1px solid #333; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
  .schedule-summary h2 { font-size: 1rem; margin-bottom: 10px; color: #a78bfa; }
  .schedule-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
  .date-slot { background: #16213e; border-radius: 8px; padding: 10px; }
  .date-slot .date { font-weight: 700; color: #60a5fa; font-size: 0.85rem; margin-bottom: 4px; }
  .date-slot .names { font-size: 0.75rem; color: #ccc; line-height: 1.5; }

  /* 성별 필터 */
  .gender-filter { display: flex; gap: 6px; justify-content: center; margin-bottom: 12px; flex-wrap: wrap; }
  .gender-btn { padding: 6px 14px; border-radius: 20px; border: 2px solid transparent; background: #1a1a1a; color: #aaa; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: all 0.2s; }
  .gender-btn:hover { background: #222; }
  .gender-btn .g-count { font-size: 0.6rem; background: #333; color: #999; padding: 1px 5px; border-radius: 10px; margin-left: 3px; }
  .gender-btn[data-gender="all"].active { border-color: #8b5cf6; color: #fff; }
  .gender-btn[data-gender="all"].active .g-count { background: #8b5cf6; color: #fff; }
  .gender-btn[data-gender="female"].active { border-color: #ec4899; color: #f472b6; }
  .gender-btn[data-gender="female"].active .g-count { background: #ec4899; color: #fff; }
  .gender-btn[data-gender="male"].active { border-color: #3b82f6; color: #60a5fa; }
  .gender-btn[data-gender="male"].active .g-count { background: #3b82f6; color: #fff; }
  .gender-badge { font-size: 0.55rem; padding: 1px 5px; border-radius: 3px; font-weight: 700; margin-left: 4px; vertical-align: middle; }
  .gender-badge-female { background: #4a0d2e; color: #f472b6; }
  .gender-badge-male { background: #1e3a5f; color: #93c5fd; }

  /* 내보내기/저장 버튼 */
  .export-bar { text-align: center; margin-bottom: 16px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .export-btn { padding: 8px 20px; border-radius: 8px; border: 1px solid #6366f1; background: transparent; color: #8b5cf6; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: all 0.2s; }
  .export-btn:hover { background: #6366f1; color: #fff; }
  .save-btn { padding: 8px 20px; border-radius: 8px; border: 1px solid #10b981; background: transparent; color: #34d399; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: all 0.2s; }
  .save-btn:hover { background: #10b981; color: #fff; }
  .load-btn { padding: 8px 20px; border-radius: 8px; border: 1px solid #f59e0b; background: transparent; color: #fbbf24; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: all 0.2s; }
  .load-btn:hover { background: #f59e0b; color: #000; }
  .file-input-hidden { display: none; }

  .footer { text-align: center; color: #444; font-size: 0.7rem; margin-top: 30px; padding-top: 16px; border-top: 1px solid #1a1a1a; }

  /* 카테고리 필터 */
  .cat-filter { display: flex; gap: 6px; justify-content: center; margin-bottom: 12px; flex-wrap: wrap; }
  .cat-btn { padding: 6px 14px; border-radius: 20px; border: 2px solid transparent; background: #1a1a1a; color: #aaa; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: all 0.2s; }
  .cat-btn:hover { background: #222; }
  .cat-btn .cat-count { font-size: 0.6rem; background: #333; color: #999; padding: 1px 5px; border-radius: 10px; margin-left: 3px; }
  .cat-btn[data-cat="all"].active { border-color: #8b5cf6; color: #fff; }
  .cat-btn[data-cat="all"].active .cat-count { background: #8b5cf6; color: #fff; }
  .cat-btn[data-cat="shinjuku"].active { border-color: #f59e0b; color: #fbbf24; }
  .cat-btn[data-cat="shinjuku"].active .cat-count { background: #f59e0b; color: #000; }
  .cat-btn[data-cat="kimono"].active { border-color: #ec4899; color: #f472b6; }
  .cat-btn[data-cat="kimono"].active .cat-count { background: #ec4899; color: #fff; }
  .cat-btn[data-cat="both"].active { border-color: #8b5cf6; color: #c084fc; }
  .cat-btn[data-cat="both"].active .cat-count { background: #8b5cf6; color: #fff; }
  .cat-btn[data-cat="unknown"].active { border-color: #6b7280; color: #9ca3af; }
  .cat-btn[data-cat="unknown"].active .cat-count { background: #6b7280; color: #fff; }
  .cat-select { padding: 4px 8px; border-radius: 6px; border: 1px solid #444; background: #1a1a1a; color: #ccc; font-size: 0.7rem; cursor: pointer; outline: none; margin-left: 4px; }
  .cat-select:focus { border-color: #ec4899; }
  .cat-badge { font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; font-weight: 700; margin-left: 6px; }
  .cat-badge-shinjuku { background: #422006; color: #fbbf24; }
  .cat-badge-kimono { background: #4a0d2e; color: #f472b6; }
  .cat-badge-both { background: #2e1065; color: #c084fc; }
  .cat-badge-unknown { background: #1f2937; color: #9ca3af; }

  /* Admin 로그인 */
  .admin-bar { display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 16px; }
  .admin-btn { padding: 6px 16px; border-radius: 8px; border: 1px solid #6366f1; background: transparent; color: #8b5cf6; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: all 0.2s; }
  .admin-btn:hover { background: #6366f1; color: #fff; }
  .admin-btn.logged-in { background: #10b981; border-color: #10b981; color: #fff; }
  .admin-status { font-size: 0.75rem; color: #666; }
  .admin-status.on { color: #34d399; }

  /* 비로그인 시 수정 컨트롤 숨기기 */
  body.viewer-mode .card-controls { display: none; }
  body.viewer-mode .export-bar .save-btn,
  body.viewer-mode .export-bar .load-btn,
  body.viewer-mode .export-bar .file-input-hidden { display: none; }

  @media (max-width: 600px) {
    .card { flex-direction: column; }
    .card-left { width: 100%; display: flex; align-items: center; gap: 10px; }
    .card-controls { flex-direction: column; align-items: stretch; }
    .schedule-grid { grid-template-columns: 1fr; }
  }
  /* Firebase 동기화 상태 */
  .sync-status { position: fixed; top: 8px; right: 8px; font-size: 0.7rem; padding: 4px 10px; border-radius: 12px; z-index: 999; font-weight: 600; }
  .sync-status.online { background: #064e3b; color: #34d399; }
  .sync-status.offline { background: #7f1d1d; color: #fca5a5; }
  .sync-status.saving { background: #78350f; color: #fbbf24; }

  /* 모델 추가 버튼 */
  .add-model-btn { padding: 8px 20px; border-radius: 8px; border: 1px solid #8b5cf6; background: #8b5cf6; color: #fff; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: all 0.2s; }
  .add-model-btn:hover { background: #7c3aed; }
  body.viewer-mode .add-model-btn { display: none; }

  /* 삭제 버튼 */
  .delete-model-btn { padding: 2px 8px; border-radius: 4px; border: 1px solid #ef4444; background: transparent; color: #f87171; cursor: pointer; font-size: 0.65rem; font-weight: 600; margin-left: auto; }
  .delete-model-btn:hover { background: #ef4444; color: #fff; }
  body.viewer-mode .delete-model-btn { display: none; }

  /* 모달 */
  .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 16px; }
  .modal-overlay.show { display: flex; }
  .modal { background: #1a1a1a; border: 1px solid #333; border-radius: 16px; padding: 24px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-size: 1.1rem; margin-bottom: 16px; color: #fff; }
  .modal-field { margin-bottom: 12px; }
  .modal-field label { display: block; font-size: 0.75rem; color: #aaa; margin-bottom: 4px; font-weight: 600; }
  .modal-field input, .modal-field select, .modal-field textarea { width: 100%; padding: 8px 12px; border-radius: 8px; border: 1px solid #333; background: #111; color: #fff; font-size: 0.85rem; outline: none; }
  .modal-field input:focus, .modal-field select:focus, .modal-field textarea:focus { border-color: #6366f1; }
  .modal-field textarea { resize: vertical; min-height: 60px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .modal-actions button { padding: 8px 20px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
  .modal-cancel { border: 1px solid #555; background: transparent; color: #aaa; }
  .modal-cancel:hover { background: #333; }
  .modal-submit { border: none; background: #8b5cf6; color: #fff; }
  .modal-submit:hover { background: #7c3aed; }
</style>
</head>
<body>

<div class="sync-status online" id="syncStatus">🟢 실시간 동기화</div>

<div class="admin-bar">
  <button class="admin-btn" id="adminBtn" onclick="toggleAdmin()">🔒 관리자 로그인</button>
  <span class="admin-status" id="adminStatus">보기 전용 모드</span>
</div>

<h1>모델 DM 관리</h1>
<p class="subtitle">walk.and.look | 2026년 3월 촬영 모델 모집</p>

<div class="stats" id="statsBar"></div>

<div class="source-filter" id="sourceFilter">
  <button class="source-btn active" data-source="all">전체</button>
  <button class="source-btn" data-source="instagram">Instagram</button>
  <button class="source-btn" data-source="threads">Threads</button>
</div>

<div class="status-tabs" id="statusTabs">
  <button class="status-tab active" data-status="all">전체 <span class="count" id="count-all">0</span></button>
  <button class="status-tab" data-status="candidate1">⭐⭐⭐ <span class="count" id="count-candidate1">0</span></button>
  <button class="status-tab" data-status="candidate2">⭐⭐ <span class="count" id="count-candidate2">0</span></button>
  <button class="status-tab" data-status="candidate3">⭐ <span class="count" id="count-candidate3">0</span></button>
  <button class="status-tab" data-status="contacting">컨택중 <span class="count" id="count-contacting">0</span></button>
  <button class="status-tab" data-status="selected">선정 <span class="count" id="count-selected">0</span></button>
  <button class="status-tab" data-status="rejected">탈락 <span class="count" id="count-rejected">0</span></button>
  <button class="status-tab" data-status="none">미분류 <span class="count" id="count-none">0</span></button>
</div>

<div class="cat-filter" id="catFilter">
  <button class="cat-btn active" data-cat="all">전체 <span class="cat-count" id="catcount-all">0</span></button>
  <button class="cat-btn" data-cat="shinjuku">신주쿠 나이트 <span class="cat-count" id="catcount-shinjuku">0</span></button>
  <button class="cat-btn" data-cat="kimono">기모노/벚꽃 <span class="cat-count" id="catcount-kimono">0</span></button>
  <button class="cat-btn" data-cat="both">둘 다 <span class="cat-count" id="catcount-both">0</span></button>
  <button class="cat-btn" data-cat="unknown">미분류 <span class="cat-count" id="catcount-unknown">0</span></button>
</div>

<div class="gender-filter" id="genderFilter">
  <button class="gender-btn active" data-gender="all">전체 <span class="g-count" id="gcount-all">0</span></button>
  <button class="gender-btn" data-gender="female">여성 <span class="g-count" id="gcount-female">0</span></button>
  <button class="gender-btn" data-gender="male">남성 <span class="g-count" id="gcount-male">0</span></button>
</div>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="이름, 핸들, 컨셉, 지역 검색...">
</div>

<div class="export-bar">
  <button class="export-btn" onclick="exportData()">선정/컨택중 목록 복사</button>
  <button class="save-btn" onclick="saveState()">💾 백업 (JSON)</button>
  <button class="load-btn" onclick="document.getElementById('loadFileInput').click()">📂 백업 복원</button>
  <input type="file" id="loadFileInput" class="file-input-hidden" accept=".json" onchange="loadState(event)">
  <button class="add-model-btn" onclick="openAddModal()">+ 모델 추가</button>
</div>

<!-- 모델 추가 모달 -->
<div class="modal-overlay" id="addModelModal">
  <div class="modal">
    <h2>모델 추가</h2>
    <div class="modal-field">
      <label>이름 *</label>
      <input type="text" id="newName" placeholder="모델 이름">
    </div>
    <div class="modal-field">
      <label>핸들 (아이디) *</label>
      <input type="text" id="newHandle" placeholder="@없이 입력">
    </div>
    <div class="modal-field">
      <label>플랫폼</label>
      <select id="newPlatform">
        <option value="instagram">Instagram</option>
        <option value="threads">Threads</option>
      </select>
    </div>
    <div class="modal-field">
      <label>성별</label>
      <select id="newGender">
        <option value="female">여성</option>
        <option value="male">남성</option>
      </select>
    </div>
    <div class="modal-field">
      <label>카테고리</label>
      <select id="newCat">
        <option value="shinjuku">신주쿠 나이트</option>
        <option value="kimono">기모노/벚꽃</option>
        <option value="both">둘 다</option>
        <option value="unknown">미분류</option>
      </select>

let models = [];

// Auto-categorize models
function autoCategory(m) {
  const allText = ((m.tags||[]).map(t=>t.t).join(' ') + ' ' + (m.msg||'')).toLowerCase();
  const isShinjuku = /나이트|night|신주쿠|shinjuku|ナイト|新宿/.test(allText);
  const isKimono = /기모노|벚꽃|kimono|착물|着物|桜|cherry|きもの/.test(allText);
  if (isShinjuku && isKimono) return 'both';
  if (isShinjuku) return 'shinjuku';
  if (isKimono) return 'kimono';
  return 'unknown';
}

// Auto-detect gender
function autoGender(m) {
  if ((m.tags||[]).some(t => t.c === 'gender-m')) return 'male';
  return 'female';
}

// Initialize defaults
function initModels(list) {
  list.forEach(m => {
    if (!m.tags) m.tags = [];
    if (!m.specs) m.specs = [];
    if (!m.msg) m.msg = '';
    if (!m.cat) m.cat = autoCategory(m);
    if (!m.gender) m.gender = autoGender(m);
    if (!m.status) m.status = 'none';
    if (!m.date) m.date = '';
    if (!m.timeSlot) m.timeSlot = '';
    if (!m.note) m.note = '';
  });
  return list;
}

defaultModels.forEach(m => {
  if (!m.cat) m.cat = autoCategory(m);
  if (!m.gender) m.gender = autoGender(m);
});

// State
let currentSource = 'all';
let currentStatus = 'all';
let currentCat = 'all';
let currentGender = 'all';
let searchQuery = '';

function getProfileUrl(m) {
  if (m.platform === 'instagram') return `https://instagram.com/${m.handle}`;
  return `https://threads.net/@${m.handle}`;
}

function renderStats() {
  const ig = models.filter(m => m.platform === 'instagram').length;
  const th = models.filter(m => m.platform === 'threads').length;
  const withDate = models.filter(m => m.tags.some(t => t.c === 'date')).length;
  const selected = models.filter(m => m.status === 'selected').length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat"><div class="stat-num">${models.length}</div><div class="stat-label">총 DM</div></div>
    <div class="stat"><div class="stat-num">${ig}</div><div class="stat-label">Instagram</div></div>
    <div class="stat"><div class="stat-num">${th}</div><div class="stat-label">Threads</div></div>
    <div class="stat"><div class="stat-num">${withDate}</div><div class="stat-label">일정 제시</div></div>
    <div class="stat"><div class="stat-num">${selected}</div><div class="stat-label">선정</div></div>
  `;
}

function renderCounts() {
  const filtered = models.filter(m => currentSource === 'all' || m.platform === currentSource);
  document.getElementById('count-all').textContent = filtered.length;
  ['candidate1','candidate2','candidate3','contacting','selected','rejected','none'].forEach(s => {
    document.getElementById('count-' + s).textContent = filtered.filter(m => m.status === s).length;
  });
  // Category counts
  document.getElementById('catcount-all').textContent = filtered.length;
  ['shinjuku','kimono','both','unknown'].forEach(c => {
    document.getElementById('catcount-' + c).textContent = filtered.filter(m => m.cat === c).length;
  });
  // Gender counts
  document.getElementById('gcount-all').textContent = filtered.length;
  document.getElementById('gcount-female').textContent = filtered.filter(m => m.gender === 'female').length;
  document.getElementById('gcount-male').textContent = filtered.filter(m => m.gender === 'male').length;
}

function renderCards() {
  const container = document.getElementById('cardsContainer');
  let html = '';
  models.forEach((m, idx) => {
    // Filter
    const sourceMatch = currentSource === 'all' || m.platform === currentSource;
    const statusMatch = currentStatus === 'all' || m.status === currentStatus;
    const catMatch = currentCat === 'all' || m.cat === currentCat;
    const genderMatch = currentGender === 'all' || m.gender === currentGender;
    const q = searchQuery.toLowerCase();
    const searchMatch = !q || m.name.toLowerCase().includes(q) || m.handle.toLowerCase().includes(q) ||
      m.msg.toLowerCase().includes(q) || m.tags.some(t => t.t.toLowerCase().includes(q));
    const hidden = !(sourceMatch && statusMatch && catMatch && genderMatch && searchMatch);

    const statusClass = m.status !== 'none' ? `status-${m.status}` : '';
    const profileUrl = getProfileUrl(m);

    let specsHtml = '';
    if (m.specs && m.specs.length) {
      specsHtml = '<div class="specs">' + m.specs.map(s => `<span class="spec-item"><strong>${s.k}:</strong> ${s.v}</span>`).join('') + '</div>';
    }

    let tagsHtml = m.tags.map(t => {
      let cls = 'tag-concept';
      if (t.c === 'location') cls = 'tag-location';
      else if (t.c === 'date') cls = 'tag-date';
      else if (t.c === 'paid') cls = 'tag-paid';
      else if (t.c === 'type') cls = 'tag-type';
      else if (t.c === 'gender-m') cls = 'tag-gender-m';
      return `<span class="tag ${cls}">${t.t}</span>`;
    }).join('');

    const followerText = m.followers !== null ? (m.followers >= 10000 ? (m.followers/10000).toFixed(1) + '만' : m.followers) : '';

    html += `
    <div class="card ${statusClass} ${hidden ? 'hidden' : ''}" data-idx="${idx}" id="card-${idx}">
      <div class="card-left">
        <div class="avatar">${m.platform === 'instagram' ? '📷' : '🧵'}</div>
        <span class="platform-badge ${m.platform === 'instagram' ? 'badge-ig' : 'badge-threads'}">${m.platform === 'instagram' ? 'IG' : 'Threads'}</span>
        ${followerText ? `<div class="follower-count">${followerText} followers</div>` : ''}
      </div>
      <div class="card-right">
        <div class="card-top">
          <div>
            <div class="card-name">${m.name}${m.verified ? ' <span style="color:#3b82f6;font-size:0.75rem;">✓</span>' : ''}<span class="gender-badge gender-badge-${m.gender}">${m.gender==='male'?'♂ 남성':'♀ 여성'}</span>${m.cat !== 'unknown' ? `<span class="cat-badge cat-badge-${m.cat}">${{shinjuku:'신주쿠',kimono:'기모노',both:'둘다'}[m.cat]}</span>` : '<span class="cat-badge cat-badge-unknown">미분류</span>'}</div>
            <div class="card-handle"><a href="${profileUrl}" target="_blank">@${m.handle}</a></div>
          </div>
          <div class="card-time">${m.time}</div>
        </div>
        <div class="tags">${tagsHtml}</div>
        ${specsHtml}
        <div class="card-msg">${m.msg}</div>
        <div class="card-controls">
          <select class="status-select" onchange="setGender(${idx}, this.value)" title="성별" style="border-color:${m.gender==='male'?'#3b82f6':'#ec4899'};">
            <option value="female" ${m.gender==='female'?'selected':''}>♀ 여성</option>
            <option value="male" ${m.gender==='male'?'selected':''}>♂ 남성</option>
          </select>
          <select class="cat-select" onchange="setCat(${idx}, this.value)">
            <option value="shinjuku" ${m.cat==='shinjuku'?'selected':''}>신주쿠</option>
            <option value="kimono" ${m.cat==='kimono'?'selected':''}>기모노</option>
            <option value="both" ${m.cat==='both'?'selected':''}>둘 다</option>

function setSyncStatus(type) {
  const el = document.getElementById('syncStatus');
  if (type === 'online') { el.className = 'sync-status online'; el.textContent = '🟢 실시간 동기화'; }
  else if (type === 'saving') { el.className = 'sync-status saving'; el.textContent = '💾 저장 중...'; }
  else { el.className = 'sync-status offline'; el.textContent = '🔴 오프라인'; }

// 모델 데이터를 Firebase용 plain object로 변환
function modelsToFirebase(list) {
  const data = {};
  list.forEach(m => {
    data[m.id] = {
      name: m.name || '', handle: m.handle || '', platform: m.platform || 'instagram',
      tab: m.tab || 'primary', tags: m.tags || [], specs: m.specs || [],
      msg: m.msg || '', time: m.time || '', followers: m.followers || null,
      verified: m.verified || false, status: m.status || 'none',
      date: m.date || '', timeSlot: m.timeSlot || '', note: m.note || '',
      cat: m.cat || 'unknown', gender: m.gender || 'female'
    };
  });
  return data;
}

// Firebase 데이터를 models 배열로 변환
function firebaseToModels(data) {
  if (!data) return [];
  return Object.keys(data).map(id => {
    const d = data[id];
    return {
      id, name: d.name || '', handle: d.handle || '', platform: d.platform || 'instagram',
      tab: d.tab || 'primary', tags: d.tags || [], specs: d.specs || [],
      msg: d.msg || '', time: d.time || '', followers: d.followers || null,
      verified: d.verified || false, status: d.status || 'none',
      date: d.date || '', timeSlot: d.timeSlot || '', note: d.note || '',
      cat: d.cat || 'unknown', gender: d.gender || 'female'
    };
  });
}

// localStorage 백업 (오프라인 대비 - 전체 데이터)
function localSave() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify(modelsToFirebase(models)));
  } catch(e) {}
}

function localLoad() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e) { return null; }
}

// Firebase에 전체 모델 데이터 저장
function autoSave() {
  localSave();
  if (!firebaseReady) return;
  setSyncStatus('saving');
  suppressFirebaseSync = true;
  modelsRef.set(modelsToFirebase(models)).then(() => {
    setSyncStatus('online');
  }).catch(() => {
    setSyncStatus('offline');
  });
}

// Firebase 실시간 리스너 - 다른 기기에서 변경 시 자동 반영 (모델 추가/삭제 포함)
modelsRef.on('value', (snapshot) => {
  firebaseReady = true;
  const data = snapshot.val();
  if (!data) {
    // Firebase 비어있음 → defaultModels로 시드
    console.log('🌱 Firebase 비어있음, 기본 데이터 시드 중...');
    models = initModels([...defaultModels.map(m => ({...m}))]);
    modelsRef.set(modelsToFirebase(models));
    localSave();
    refreshUI();
    return;
  }
  if (suppressFirebaseSync) { suppressFirebaseSync = false; return; }
  models = initModels(firebaseToModels(data));
  localSave();
  refreshUI();
  setSyncStatus('online');
  console.log('🔄 Firebase에서 전체 데이터 동기화됨 (' + models.length + '명)');
});

  const tags = tagsRaw ? tagsRaw.split(',').map(t => ({t: t.trim(), c: 'concept'})) : [];

  const existingNums = models.filter(m => m.id.startsWith(prefix + '-')).map(m => parseInt(m.id.split('-')[1]) || 0);

    tags, specs: [], msg: msg || '', time: new Date().toLocaleDateString('ko-KR', {month:'2-digit', day:'2-digit'}).replace('.','/',1).replace('.',''),

// ===== JSON 파일 저장/불러오기 (백업/이동용 - 전체 데이터) =====
const SAVE_VERSION = 3;

function saveState() {
  const state = {
    _version: SAVE_VERSION,
    _savedAt: new Date().toISOString(),
    _count: models.length,
    models: modelsToFirebase(models)
  };
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `model_backup_${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  alert('전체 모델 데이터가 JSON 파일로 저장되었습니다! (' + models.length + '명)');
}

function loadState(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const state = JSON.parse(e.target.result);
      let dataMap = {};

      // v3: 전체 모델 데이터
      if (state._version >= 3 && state.models) {
        dataMap = state.models;
      }
      // v2 호환: 상태만 있는 경우 → 기존 모델에 상태 적용
      else if (state.models && typeof state.models === 'object') {
        // 상태만 있는 v2 파일
        models.forEach(m => {
          const saved = state.models[m.id];
          if (saved) {
            if (saved.status !== undefined) m.status = saved.status === 'candidate' ? 'candidate3' : saved.status;
            if (saved.date !== undefined) m.date = saved.date;
            if (saved.timeSlot !== undefined) m.timeSlot = saved.timeSlot;
            if (saved.note !== undefined) m.note = saved.note;
            if (saved.cat !== undefined) m.cat = saved.cat;
            if (saved.gender !== undefined) m.gender = saved.gender;
          }
        });
        autoSave();
        refreshUI();
        alert('v2 백업에서 상태 복원 완료!');
        event.target.value = '';
        return;
      } else {
        // 기타 형식
        Object.keys(state).forEach(k => {
          if (k !== '_version' && k !== '_savedAt' && k !== '_count' && typeof state[k] === 'object') {
            dataMap[k] = state[k];
          }
        });
      }

      if (Object.keys(dataMap).length > 0) {
        models = initModels(firebaseToModels(dataMap));
        autoSave();
        refreshUI();
        alert(`불러오기 완료! ${models.length}명의 모델 데이터가 복원되었습니다.`);
      } else {
        alert('복원할 데이터가 없습니다.');
      }
    } catch(err) {
      alert('JSON 파일을 읽을 수 없습니다: ' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

    if (m.note) text += `   메모: ${m.note}\n`;
    text += `   ${getProfileUrl(m)}\n\n`;
  });
  navigator.clipboard.writeText(text).then(() => alert('클립보드에 복사되었습니다!')).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); alert('클립보드에 복사되었습니다!');
  });
}

// ===== Admin 로그인 =====
const ADMIN_HASH = 'c8347cf5ec20aa8d03fbb137697535bd0b150f14fb49bab7d006705c78631aa7';
let isAdmin = false;

async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,'0')).join('');
}

async function toggleAdmin() {
  if (isAdmin) {
    isAdmin = false;
    try { sessionStorage.removeItem('admin_auth'); } catch(e){}
    applyAdminState();
    return;
  }
  const pw = prompt('관리자 비밀번호를 입력하세요:');
  if (!pw) return;
  const hash = await sha256(pw);
  if (hash === ADMIN_HASH) {
    isAdmin = true;
    try { sessionStorage.setItem('admin_auth', '1'); } catch(e){}
    applyAdminState();
  } else {
    alert('비밀번호가 틀렸습니다.');
  }
}

function applyAdminState() {
  const btn = document.getElementById('adminBtn');
  const status = document.getElementById('adminStatus');
  if (isAdmin) {
    document.body.classList.remove('viewer-mode');
    btn.textContent = '🔓 로그아웃';
    btn.classList.add('logged-in');
    status.textContent = '관리자 모드';
    status.classList.add('on');
  } else {
    document.body.classList.add('viewer-mode');
    btn.textContent = '🔒 관리자 로그인';
    btn.classList.remove('logged-in');
    status.textContent = '보기 전용 모드';
    status.classList.remove('on');
  }
}
